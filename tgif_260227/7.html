<!DOCTYPE html>
<html lang="ja" data-theme="light" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Codex連携のシーケンス</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1:wght@300;500;800&amp;family=Noto+Sans+JP:wght@400;700&amp;display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
        body {
            margin: 0;
            padding: 0;
            width: 1280px;
            height: 720px;
            background-color: #0B1120;
            font-family: 'M PLUS 1', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* SVG Pattern Background */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h2v2H1V1zm4 4h2v2H5V5zm4 4h2v2H9V9zm4 4h2v2h-2v-2zm4 4h2v2h-2v-2z' fill='%236366F1' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px 60px;
        }

        .header-line {
            height: 4px;
            width: 100px;
            background-color: #3B82F6;
            margin-bottom: 20px;
        }

        /* Sequence Diagram Container */
        .sequence-container {
            flex: 1;
            position: relative;
            margin-top: 20px;
            /* background-color: rgba(30, 41, 59, 0.3); */
            border-radius: 16px;
            padding-top: 60px; /* Space for actor headers */
        }

        /* Actor Columns */
        .actor {
            position: absolute;
            top: 0;
            width: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            z-index: 10;
        }

        .actor-head {
            width: 100%;
            padding: 12px;
            background-color: #1E293B;
            border: 2px solid #475569;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 20;
        }

        .actor-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .actor-name {
            font-weight: bold;
            font-size: 0.9rem;
            color: #E2E8F0;
        }

        .lifeline {
            width: 2px;
            flex: 1;
            background-color: #334155;
            margin-top: 10px;
            position: relative;
            border-right: 2px dashed #334155; /* Dashed line effect */
            background: transparent;
        }
        
        /* Dashed lifeline using borders since gradients are restricted */
        .lifeline::after {
            content: '';
            position: absolute;
            top: 0;
            left: -1px;
            width: 2px;
            height: 100%;
            border-left: 2px dashed #475569;
        }

        /* Actor Specific Styles */
        .actor-slack { left: 50px; }
        .actor-slack .actor-head { border-color: #E01E5A; }
        .actor-slack .actor-icon { color: #E01E5A; }

        .actor-codex { left: 350px; }
        .actor-codex .actor-head { border-color: #6366F1; }
        .actor-codex .actor-icon { color: #6366F1; }

        .actor-skills { left: 650px; }
        .actor-skills .actor-head { border-color: #F59E0B; }
        .actor-skills .actor-icon { color: #F59E0B; }

        .actor-external { left: 950px; }
        .actor-external .actor-head { border-color: #10B981; }
        .actor-external .actor-icon { color: #10B981; }

        /* Activation Bars */
        .activation {
            position: absolute;
            width: 12px;
            left: -6px; /* Center on lifeline */
            background-color: #475569;
            border-radius: 4px;
            z-index: 15;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* SVG Layer for Arrows */
        svg.arrows-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* Message Labels */
        .message-label {
            position: absolute;
            font-size: 0.8rem;
            color: #CBD5E1;
            background-color: #0B1120;
            padding: 2px 8px;
            border-radius: 4px;
            transform: translate(-50%, -120%);
            white-space: nowrap;
            z-index: 20;
            border: 1px solid #334155;
        }

        .step-badge {
            display: inline-block;
            background-color: #3B82F6;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            text-align: center;
            line-height: 18px;
            font-size: 0.7rem;
            margin-right: 6px;
            font-weight: bold;
        }

        /* Note Box */
        .note-box {
            position: absolute;
            background-color: rgba(253, 224, 71, 0.1);
            border: 1px solid #FDE047;
            color: #FDE047;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            max-width: 180px;
            z-index: 25;
        }

        .note-box::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -6px;
            margin-top: -6px;
            border-width: 6px 6px 6px 0;
            border-color: transparent #FDE047 transparent transparent;
        }

    </style>
</head>
<body style="">
<div class="bg-pattern"></div>
<div class="content-wrapper">
<!-- Header -->
<header class="mb-4">
<div class="header-line"></div>
<h1 class="text-4xl font-bold tracking-tight text-white mb-2">Codex連携のシーケンス</h1>
<p class="text-gray-400 text-lg">Slackから話しかけるだけで、裏側で複数のAgentとシステムが連携して回答を作る。</p>
</header>
<!-- Sequence Diagram -->
<div class="sequence-container">
<!-- Actors -->
<!-- Actor 1: Slack -->
<div class="actor actor-slack">
<div class="actor-head">
<i class="fab fa-slack actor-icon"></i>
<div class="actor-name">User (Slack)</div>
</div>
<div class="lifeline">
<div class="activation" style="top: 30px; height: 40px; background-color: #E01E5A;"></div>
<div class="activation" style="top: 380px; height: 40px; background-color: #E01E5A;"></div>
</div>
</div>
<!-- Actor 2: Codex -->
<div class="actor actor-codex">
<div class="actor-head">
<i class="fas fa-robot actor-icon"></i>
<div class="actor-name">Codex Agent</div>
</div>
<div class="lifeline">
<div class="activation" style="top: 50px; height: 350px; background-color: #6366F1;"></div>
</div>
</div>
<!-- Actor 3: Skills (Router) -->
<div class="actor actor-skills">
<div class="actor-head">
<i class="fas fa-traffic-light actor-icon"></i>
<div class="actor-name">Router Skill</div>
</div>
<div class="lifeline">
<div class="activation" style="top: 90px; height: 280px; background-color: #F59E0B;"></div>
</div>
</div>
<!-- Actor 4: External -->
<div class="actor actor-external">
<div class="actor-head">
<i class="fas fa-server actor-icon"></i>
<div class="actor-name">各種Skills&nbsp;</div>
</div>
<div class="lifeline">
<div class="activation" style="top: 170px; height: 100px; background-color: #10B981;"></div>
</div>
</div>
<!-- SVG Arrows -->
<svg class="arrows-layer">
<defs>
<marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
<polygon fill="#94A3B8" points="0 0, 10 3.5, 0 7"></polygon>
</marker>
<marker id="arrowhead-blue" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5">
<polygon fill="#60A5FA" points="0 0, 10 3.5, 0 7"></polygon>
</marker>
</defs>
<!-- 1. Slack -> Codex -->
<line marker-end="url(#arrowhead)" stroke="#94A3B8" stroke-width="2" x1="120" x2="420" y1="120" y2="120"></line>
<!-- 2. Codex -> Router -->
<line marker-end="url(#arrowhead)" stroke="#94A3B8" stroke-width="2" x1="420" x2="720" y1="160" y2="160"></line>
<!-- 3. Router -> External -->
<line marker-end="url(#arrowhead)" stroke="#94A3B8" stroke-width="2" x1="720" x2="1020" y1="240" y2="240"></line>
<!-- 4. External -> Router (Return) -->
<line marker-end="url(#arrowhead)" stroke="#94A3B8" stroke-dasharray="5,5" stroke-width="2" x1="1020" x2="720" y1="310" y2="310"></line>
<!-- 5. Router -> Codex (Return) -->
<line marker-end="url(#arrowhead)" stroke="#94A3B8" stroke-dasharray="5,5" stroke-width="2" x1="720" x2="420" y1="350" y2="350"></line>
<!-- 6. Codex -> Slack -->
<line marker-end="url(#arrowhead-blue)" stroke="#60A5FA" stroke-width="3" x1="420" x2="120" y1="450" y2="450"></line>
<!-- Loop Box for Router Internal Logic -->
<path d="M 730 170 Q 760 170 760 190 Q 760 210 730 210" fill="none" stroke="#F59E0B" stroke-width="2"></path>
</svg>
<!-- Labels -->
<!-- Step 1 -->
<div class="message-label" style="left: 270px; top: 120px;">
<span class="step-badge">1</span>質問投稿 (@bot)
            </div>
<!-- Step 2 -->
<div class="message-label" style="left: 570px; top: 160px;">
<span class="step-badge">2</span>意図判定 &amp; Skill呼出
            </div>
<!-- Internal Loop Label -->
<div class="message-label" style="left: 810px; top: 190px; transform: translate(0, -50%); border-color: #F59E0B; color: #FCD34D;">
<span class="step-badge" style="background-color: #F59E0B;">3</span>適切なSkillを選択
            </div>
<!-- Step 4 -->
<div class="message-label" style="left: 870px; top: 240px;">
<span class="step-badge">4</span>実行 (SQL/検索/Fetch)
            </div>
<!-- Step 5 -->
<div class="message-label" style="left: 870px; top: 310px;">
<span class="step-badge">5</span>結果データ返却
            </div>
<!-- Step 6 -->
<div class="message-label" style="left: 570px; top: 350px;">
<span class="step-badge">6</span>結果集約
            </div>
<!-- Step 7 -->
<div class="message-label" style="left: 270px; top: 450px; border-color: #3B82F6; color: #93C5FD;">
<span class="step-badge">7</span>下書き回答・返信
            </div>
<!-- Additional Notes -->
<div class="note-box" style="left: 440px; top: 400px;">
<p class="font-bold mb-1">Point</p>
<p>最終的な文面整形はCodex(LLM)が担当し、自然な日本語にする</p>
</div>
</div>
</div>

</body></html>
